#<c-b>b: de tat bat status bar
bind b set -g status
# hoat dong tron tru giua vim & tmux
set-option -g focus-events on
set -g focus-events on

bind-key G new-window -n TWO \; new-window -n THREE \; new-window -n FOUR
# default set

set -g pane-active-border-style fg=yellow
# set -g status-style bg=colour236,fg=colour250
set -g status-style bg="#282a36",fg="#f8f8f2"
set -g window-status-current-style fg=yellow
set -g status-left ""
# set -g status-right ""
set -as terminal-features ',xterm-kitty:RGB'
set -as terminal-features ',xterm-kitty:cursor'
set -g set-clipboard on

# Set window option --> vimode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Alt + number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window

# Ctrl+h/j/k/l → chuyển pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# tạo window mới
bind c new-window

# đóng pane
bind x kill-pane

# split giống vim
bind | split-window -h
bind - split-window -v

# reload config
bind r source-file ~/.tmux.conf \; display "tmux reloaded"

# đánh số từ 1
set -g base-index 1
setw -g pane-base-index 1
